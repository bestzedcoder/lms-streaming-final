
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
    client_max_body_size 20M;

    server {
        listen       80;
        server_name  localhost;

        location / {
            proxy_pass http://localhost:5173;
	    proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://localhost:4000;
	    proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

	
	location /admin/ {
            # BƯỚC 1: LẬP HÀNG RÀO BẢO MẬT BẰNG IP
            allow 127.0.0.1;        
            deny all;               

            proxy_pass http://localhost:5174;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cấu hình WebSocket cho Vite Hot-reload (khi dev)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            error_page 403 /403.html;
        }

	location ~ ^/(css|js|images)/ {
            proxy_pass http://localhost:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # (Tùy chọn) Ép trình duyệt cache file tĩnh cho web load nhanh hơn
            # expires 30d;
            # add_header Cache-Control "public, no-transform";
        }

        location = /403.html {
            alias D:/hoc-tap/do-an-tot-nghiep/code/lms-video-streaming-be/src/main/resources/templates/error/403.html;
            internal;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }



    # HTTPS server
    #
    #server {
    #    listen       443 ssl;
    #    server_name  localhost;

    #    ssl_certificate      cert.pem;
    #    ssl_certificate_key  cert.key;

    #    ssl_session_cache    shared:SSL:1m;
    #    ssl_session_timeout  5m;

    #    ssl_ciphers  HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers  on;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}

}
